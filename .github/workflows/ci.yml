name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  macos:
    name: macOS (Vision)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - name: Generate hello.png fixture
        run: swift tests/fixtures/make_hello.swift tests/fixtures/hello.png
      - run: cargo test --all

  linux:
    name: Linux (Tesseract)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libtesseract-dev libleptonica-dev tesseract-ocr-eng \
            clang pkg-config \
            wl-clipboard xclip xvfb imagemagick
      - run: cargo clippy --all-targets -- -D warnings
      - name: Generate hello.png fixture
        run: |
          convert -background white -fill black -size 400x120 \
            -font DejaVu-Sans -pointsize 48 \
            label:'Hello, world.' tests/fixtures/hello.png
      - run: cargo build --all
      - name: Unit/integration tests
        run: cargo test --all
      - name: End-to-end via xclip (X11, headless)
        run: |
          xvfb-run -a bash -c '
            xclip -selection clipboard -t image/png -i tests/fixtures/hello.png &
            sleep 1
            out=$(cargo run --quiet -- --plain --no-copy)
            echo "got: $out"
            echo "$out" | grep -q "Hello"
          '
